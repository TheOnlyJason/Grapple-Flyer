<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0e1230" />
    <meta
      name="description"
      content="GALE — a kinetic sky-sailing endless runner. Glide, swing from anchors, and slingshot through a broken sky-world."
    />
    <title>GALE — Sky-Sailing Runner</title>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7229610250001171"
      crossorigin="anonymous"
    ></script>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0d24;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
        overscroll-behavior: none;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        cursor: pointer;
        touch-action: none;
      }
      /* Loading flash before the first frame paints */
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #1a2150 0%, #0a0d24 100%);
        color: #cdd6ff;
        letter-spacing: 0.4em;
        font-size: 14px;
        text-transform: uppercase;
        transition: opacity 0.4s ease;
        z-index: 10;
      }
      #boot.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="boot">GALE</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
